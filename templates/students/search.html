{% extends 'base.html' %}

{% block content %}

<style>

/* RESET */
.course-card, .card {
    all: unset;
}

/* BACKGROUND */
body {
    background: linear-gradient(to right, #f0f7ff, #e0f2fe);
    font-family: 'Segoe UI', sans-serif;
}

/* CONTAINER */
.container {
    padding: 50px;
}

/* TITLE */
.title {
    font-size: 42px;
    font-weight: bold;
    margin-bottom: 30px;
}

/* SEARCH */
.search-box {
    display: flex;
    max-width: 450px;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    margin-bottom: 40px;
}

.search-box input {
    flex: 1;
    padding: 14px;
    border: none;
    outline: none;
    background: white;
}

.search-box button {
    padding: 14px 25px;
    border: none;
    background: #0ea5e9;
    color: white;
    cursor: pointer;
}

.search-box button:hover {
    background: #0284c7;
}

/* GRID */
.course-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 30px;
}

/* CARD */
.course-card {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.course-card:hover {
    transform: translateY(-6px);
}

/* TEXT */
.course-card h3 {
    margin-bottom: 10px;
}

.course-card p {
    color: #555;
    margin-bottom: 15px;
}

/* PRICE */
.price {
    font-weight: bold;
    color: #16a34a;
    margin-bottom: 15px;
}

/* BUTTONS */
.btn {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 25px;
    text-decoration: none;
    color: white;
    margin-right: 8px;
    font-size: 14px;
}

.btn.view {
    background: #6366f1;
}

.btn.buy {
    background: #ef4444;
}

.btn.buy:hover {
    background: #dc2626;
}

.btn.view:hover {
    background: #4f46e5;
}

/* DISABLED BUTTON */
button[disabled] {
    background: #9ca3af;
    cursor: not-allowed;
}

</style>

<div class="container">

    <div class="title">📚 All Courses</div>

    <!-- SEARCH -->
    <form method="GET" class="search-box">
        <input type="text" name="q" placeholder="Search courses...">
        <button type="submit">Search</button>
    </form>

    <!-- COURSES -->
    <div class="course-grid">

        {% for course in courses %}
            <div class="course-card">

                <h3>{{ course.title }}</h3>
                <p>{{ course.description }}</p>

                <div class="price">₹{{ course.price }}</div>

                <!-- VIEW -->
                <a href="/course/{{ course.id }}/" class="btn view">View</a>

                <!-- 🔥 BUY LOGIC -->
                 {% if course.id in purchased_courses %}
                    <button class="btn buy" disabled>Already Purchased</button>
                {% else %}
                    <a href="{% url 'buy_course' course.id %}" class="btn buy">Buy</a>
                {% endif %}

            </div>
        {% empty %}
            <p>No courses found</p>
        {% endfor %}

    </div>

</div>

{% endblock %}
