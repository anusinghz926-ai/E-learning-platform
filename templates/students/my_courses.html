{% extends 'base.html' %}

{% block content %}

<h2>My Courses</h2>

{% for p in purchases %}
    <div class="card">
        <h3>{{ p.course.title }}</h3>

        <video width="400" controls>
            <source src="{{ p.course.video.url }}">
        </video>

        <br>
        <a class="btn" href="{{ p.course.notes.url }}">Download Notes</a>
    </div>
{% endfor %}

{% endblock %}
